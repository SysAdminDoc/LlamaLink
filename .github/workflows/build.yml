name: Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 requests pyinstaller pillow

      - name: Generate icon
        run: python gen_icon.py

      - name: Build executable
        run: pyinstaller llamalink.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LlamaLink-Windows
          path: dist/LlamaLink.exe

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload ${{ github.ref_name }} dist/LlamaLink.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 requests pyinstaller pillow

      - name: Generate icon
        run: python gen_icon.py

      - name: Build executable
        run: pyinstaller llamalink.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LlamaLink-macOS
          path: dist/LlamaLink

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist && zip -r LlamaLink-macOS.zip LlamaLink
          gh release upload ${{ github.ref_name }} LlamaLink-macOS.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0

      - name: Install dependencies
        run: pip install PyQt6 requests pyinstaller pillow

      - name: Generate icon
        run: python gen_icon.py

      - name: Build executable
        run: pyinstaller llamalink.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LlamaLink-Linux
          path: dist/LlamaLink

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist && tar czf LlamaLink-Linux.tar.gz LlamaLink
          gh release upload ${{ github.ref_name }} LlamaLink-Linux.tar.gz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
