name: Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish src/LlamaLink.csproj -c Release -o dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LlamaLink-Windows
          path: dist/LlamaLink.exe

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload ${{ github.ref_name }} dist/LlamaLink.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
